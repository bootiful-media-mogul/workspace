services:
  pgvector:
    image: "pgvector/pgvector:pg16"
    environment:
      - "POSTGRES_DB=mogul"
      - "POSTGRES_PASSWORD=mogul"
      - "POSTGRES_USER=mogul"
    ports:
      - "5432:5432"
  rabbitmq:
    image: 'rabbitmq:management'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=secret'
      - 'RABBITMQ_DEFAULT_USER=myuser'
    ports:
      - '5672:5672'
      - '15672:15672'

